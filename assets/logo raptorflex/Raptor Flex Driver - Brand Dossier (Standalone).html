document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:800;letter-spacing:-0.5px;color:#FFFFFF;\">Configuración React Native<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:14px;color:#9CA3AF;line-height:1.75;margin-bottom:56px;max-width:640px;\">\n      Variables de entorno y tokens listos para copiar. Compatible con Expo SDK 50+, react-navigation v6 y react-native-paper v5.\n    <\u002Fp>\n\n    <!-- .env -->\n    <div style=\"margin-bottom:28px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;background:#1A2540;border-radius:10px 10px 0 0;padding:13px 20px;border:1px solid rgba(245,200,0,0.15);border-bottom:none;\">\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <div style=\"display:flex;gap:6px;\">\n            <div style=\"width:10px;height:10px;border-radius:5px;background:#EF4444;\"><\u002Fdiv>\n            <div style=\"width:10px;height:10px;border-radius:5px;background:#F59E0B;\"><\u002Fdiv>\n            <div style=\"width:10px;height:10px;border-radius:5px;background:#22C55E;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:#9CA3AF;margin-left:6px;\">.env<\u002Fspan>\n        <\u002Fdiv>\n        <span style=\"font-family:'DM Mono',monospace;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#6B7280;\">Variables de Entorno<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"background:#111827;border:1px solid rgba(245,200,0,0.15);border-radius:0 0 10px 10px;padding:28px 28px;overflow-x:auto;\">\n<pre style=\"font-family:'DM Mono',monospace;font-size:13px;line-height:2.1;margin:0;white-space:pre-wrap;\"><span style=\"color:#6B7280\"># ── Tema de la App ────────────────────────────────────────<\u002Fspan><br><span style=\"color:#F5C800\">APP_THEME<\u002Fspan>=<span style=\"color:#22C55E\">dark<\u002Fspan><br><br><span style=\"color:#6B7280\"># ── Paleta modo claro ─────────────────────────────────────<\u002Fspan><br><span style=\" ze:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#6B7280;\">React Navigation v6<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"background:#111827;border:1px solid rgba(245,200,0,0.15);border-radius:0 0 10px 10px;padding:28px 28px;overflow-x:auto;\">\n<pre style=\"font-family:'DM Mono',monospace;font-size:13px;line-height:1.9;margin:0;white-space:pre;\"><span style=\"color:#3B82F6\">import<\u002Fspan> { <span style=\"color:#F9FAFB\">DarkTheme<\u002Fspan> } <span style=\"color:#3B82F6\">from<\u002Fspan> <span style=\"color:#22C55E\">'@react-navigation/native'<\u002Fspan>;\n<span style=\"color:#3B82F6\">import<\u002Fspan> { <span style=\"color:#F9FAFB\">colors<\u002Fspan> } <span style=\"color:#3B82F6\">from<\u002Fspan> <span style=\"color:#22C55E\">'./colors'<\u002Fspan>;\n\n<span style=\"color:#3B82F6\">export const<\u002Fspan> <span style=\"color:#F9FAFB\">AppNavigationTheme<\u002Fspan> = {\n  ...<span style=\"color:#F9FAFB\">DarkTheme<\u002Fspan>,\n  <span style=\"color:#F5C800\">colors<\u002Fspan>: {\n    ...<span style=\"color:#F9FAFB\">DarkTheme<\u002Fspan>.<span style=\"color:#F5C800\">colors<\u002Fspan>,\n    <span style=\"color:#F5C800\">primary<\u002Fspan>:      <span style=\"color:#F9FAFB\">colors<\u002Fspan>.<span style=\"color:#F5C800\">primary<\u002Fspan>,      <span style=\"color:#6B7280\">// #F5C800<\u002Fspan>\n    <span style=\"color:#F5C800\">background<\u002Fspan>:   <span style=\"color:#F9FAFB\">colors<\u002Fspan>.<span style=\"color:#F5C800\">bg<\u002Fspan>,          <span style=\"color:#6B7280\">// #111827<\u002Fspan>\n    <span style=\"color:#F5C800\">card<\u002Fspan>:         <span style=\"color:#F9FAFB\">colors<\u002Fspan>.<span style=\"color:#F5C800\">surface<\u002Fspan>,     <span style=\"color:#6B7280\">// #1F2937<\u002Fspan>\n    <span style=\"color:#F5C800\">text<\u002Fspan>:         <span style=\"color:#F9FAFB\">colors<\u002Fspan>.<span style=\"color:#F5C800\">text<\u002Fspan>,        <span style=\"color:#6B7280\">// #FFFFFF<\u002Fspan>\n    <span style=\"color:#F5C800\">border<\u002Fspan>:       <span style=\"color:#F9FAFB\">colors<\u002Fspan>.<span style=\"color:#F5C800\">border<\u002Fspan>,      <span style=\"color:#6B7280\">// #4B5563<\u002Fspan>\n    <span style=\"color:#F5C800\">notification<\u002Fspan>: <span style=\"color:#F9FAFB\">colors<\u002Fspan>.<span style=\"color:#F5C800\">primary<\u002Fspan>,      <span style=\"color:#6B7280\">// #F5C800<\u002Fspan>\n  },\n};<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── FOOTER ─────────────────────────────────────────────── -->\n<footer style=\"background:#0A1120;padding:36px 40px;border-top:1px solid rgba(245,200,0,0.1);\">\n  <div style=\"max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <svg width=\"14\" height=\"17\" viewBox=\"0 0 84 100\" fill=\"none\">\n        <path d=\"M0 0L16 0L44 100L28 100Z\" fill=\"#F5C800\"><\u002Fpath>\n        <path d=\"M22 0L38 0L66 100L50 100Z\" fill=\"#F5C800\" opacity=\"0.7\"><\u002Fpath>\n        <path d=\"M44 0L58 0L84 100L70 100Z\" fill=\"#F5C800\" opacity=\"0.5\"><\u002Fpath>\n      <\u002Fsvg>\n      <span style=\"font-size:13px;font-weight:600;color:#6B7280;\">RAPTOR FLEX DRIVER — Brand Identity System v1.0<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-family:'DM Mono',monospace;font-size:12px;color:#4B5563;\">Chile · 2025 · Última Milla<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const mkColor = (name, token, code, role) => ({\n      name, token, code, role,\n      swatchStyle: { background: code, height: '80px', display: 'block' },\n    });\n\n    const brandColors = [\n      mkColor('Primary', 'color.primary', '#F5C800', 'CTAs, estados activos, íconos clave'),\n      mkColor('Primary Dark', 'color.primary.dark', '#C4A000', 'Hover y estados presionados'),\n      mkColor('Primary Light', 'color.primary.light', '#FFD740', 'Highlights y gradientes de acento'),\n      mkColor('Primary Muted', 'color.primary.muted', 'rgba(245,200,0,0.12)', 'Fondos con tinte amarillo · 12% alpha'),\n    ];\n\n    const bgColors = [\n      mkColor('Background', 'color.bg', '#111827', 'Fondo principal de la app'),\n      mkColor('Surface', 'color.surface', '#1F2937', 'Tarjetas, paneles, barra inferior'),\n      mkColor('Surface 2', 'color.surface.2', '#374151', 'Elementos elevados, modales'),\n      mkColor('Border', 'color.border', '#4B5563', 'Divisores y bordes de inputs'),\n    ];\n\n    const textColors = [\n      mkColor('Text', 'color.text', '#FFFFFF', 'Texto principal del cuerpo'),\n      mkColor('Text Secondary', 'color.text.secondary', '#D1D5DB', 'Etiquetas secundarias, subtítulos'),\n      mkColor('Text Muted', 'color.text.muted', '#9CA3AF', 'Placeholders y textos de ayuda'),\n      mkColor('Text Disabled', 'color.text.disabled', '#6B7280', 'Elementos en estado deshabilitado'),\n    ];\n\n    const semanticColors = [\n      mkColor('Success', 'color.success', '#22C55E', 'Entrega confirmada, estado OK'),\n      mkColor('Error', 'color.error', '#EF4444', 'Entrega fallida, alerta crítica'),\n      mkColor('Warning', 'color.warning', '#F59E0B', 'Pendiente, requiere atención del driver'),\n      mkColor('Info', 'color.info', '#3B82F6', 'Información de ruta, notas de pedido'),\n    ];\n\n    const iconSizes = [\n      { label: '1024×1024', sub: 'App Store / Play Store', d: 160, r: 36 },\n      { label: '256×256',   sub: 'Launcher XL',            d: 96,  r: 22 },\n      { label: '128×128',   sub: 'Notificación',           d: 72,  r: 16 },\n      { label: '64×64',     sub: 'Configuración',          d: 56,  r: 12 },\n      { label: '48×48',     sub: 'Tamaño mínimo',          d: 48,  r: 10 },\n    ].map(s => ({\n      ...s,\n      iconStyle: {\n        width:         s.d + 'px',\n        height:        s.d + 'px',\n        background:    '#111827',\n        borderRadius:  s.r + 'px',\n        border:        '1.5px solid rgba(245,200,0,0.35)',\n        boxShadow:     '0 0 32px rgba(245,200,0,0.1), 0 8px 24px rgba(0,0,0,0.55)',\n        display:       'flex',\n        alignItems:    'center',\n        justifyContent:'center',\n        flexShrink:    0,\n      },\n      cw: Math.round(s.d * 0.52),\n      ch: Math.round(s.d * 0.62),\n    }));\n\n    return { brandColors, bgColors, textColors, semanticColors, iconSizes };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
